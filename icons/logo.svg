<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="50%" stop-color="#7c6fff"/>
      <stop offset="50%" stop-color="#f0edff"/>
      <stop offset="100%" stop-color="#f0edff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>

  <!-- Cross/plus symbol -->
  <rect x="82" y="44" width="36" height="112" rx="18" fill="url(#cross)" opacity="0.9" filter="url(#glow)"/>
  <rect x="44" y="82" width="112" height="36" rx="18" fill="url(#cross)" opacity="0.9" filter="url(#glow)"/>

  <!-- Pill overlaid on bottom-right -->
  <g transform="rotate(-35 140 140)">
    <rect x="110" y="128" width="58" height="26" rx="13" fill="url(#pill1)" opacity="0.95"/>
    <line x1="139" y1="128" x2="139" y2="154" stroke="rgba(124,111,255,0.5)" stroke-width="1.5"/>
  </g>

  <!-- Subtle sparkle dots -->
  <circle cx="38" cy="38" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="162" cy="40" r="2" fill="#c084fc" opacity="0.5"/>
  <circle cx="30" cy="160" r="2" fill="#7c6fff" opacity="0.4"/>
</svg>
